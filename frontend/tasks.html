<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks — Team Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Team Task Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link active" href="tasks.html">Tasks</a></li>
        </ul>
        <span class="navbar-text text-white me-2">
          <span id="navUserName"></span>
          <span id="navUserRole" class="badge ms-1"></span>
        </span>
        <a href="#" id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="page-header">
      <h1>Tasks</h1>
      <p class="text-muted">Manage and track tasks</p>
    </div>

    <div id="alertBox"></div>

    <!-- Admin: create task -->
    <div class="card table-card p-4 mb-4 admin-only" id="createTaskCard">
      <h5 class="mb-3">Create Task</h5>
      <form id="taskForm" class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Title</label>
          <input type="text" class="form-control" id="taskTitle" required />
        </div>
        <div class="col-md-3">
          <label class="form-label">Project</label>
          <select class="form-select" id="taskProject" required></select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Assign To</label>
          <select class="form-select" id="taskAssignee">
            <option value="">Unassigned</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Due Date</label>
          <input type="date" class="form-control" id="taskDueDate" />
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <input type="text" class="form-control" id="taskDescription" />
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">Create Task</button>
        </div>
      </form>
    </div>

    <div class="card table-card p-4">
      <h5 class="mb-3">Task List</h5>
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>Title</th>
              <th>Project</th>
              <th>Assignee</th>
              <th>Status</th>
              <th>Due</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tasksTable">
            <tr><td colspan="6" class="text-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer>Team Task Manager</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script>
    if (!requireAuth()) throw new Error("auth");
    setupNavbar();

    const user = getUser();
    const admin = isAdmin();

    async function loadSelectOptions() {
      if (!admin) return;
      try {
        const [projects, users] = await Promise.all([
          apiRequest("/projects"),
          apiRequest("/users"),
        ]);
        document.getElementById("taskProject").innerHTML = projects
          .map((p) => `<option value="${p.id}">${p.title}</option>`)
          .join("");
        document.getElementById("taskAssignee").innerHTML =
          '<option value="">Unassigned</option>' +
          users.map((u) => `<option value="${u.id}">${u.name} (${u.role})</option>`).join("");
      } catch (err) {
        showAlert("alertBox", err.message);
      }
    }

    function statusOptions(current, taskId, canEditFull) {
      const statuses = ["Pending", "In Progress", "Completed"];
      if (canEditFull) {
        return statuses.map((s) =>
          `<option value="${s}" ${s === current ? "selected" : ""}>${s}</option>`
        ).join("");
      }
      return `<select class="form-select form-select-sm" onchange="updateStatus(${taskId}, this.value)">
        ${statuses.map((s) => `<option value="${s}" ${s === current ? "selected" : ""}>${s}</option>`).join("")}
      </select>`;
    }

    async function loadTasks() {
      const tbody = document.getElementById("tasksTable");
      try {
        const tasks = await apiRequest("/tasks");
        if (!tasks.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-muted">No tasks found.</td></tr>';
          return;
        }
        tbody.innerHTML = tasks.map((t) => {
          const badge = `<span class="badge ${statusBadgeClass(t.status)}">${t.status}</span>`;
          let actions = "";
          if (admin) {
            actions = `<button class="btn btn-sm btn-danger" onclick="deleteTask(${t.id})">Delete</button>`;
          } else if (t.assigned_to === user.id) {
            actions = statusOptions(t.status, t.id, false);
          }
          const statusCell = admin
            ? `<select class="form-select form-select-sm" onchange="updateStatus(${t.id}, this.value)">${statusOptions(t.status, t.id, true)}</select>`
            : (t.assigned_to === user.id ? actions : badge);
          return `
            <tr>
              <td><strong>${t.title}</strong><br><small class="text-muted">${t.description || ""}</small></td>
              <td>${t.project_title || t.project_id}</td>
              <td>${t.assignee_name || "—"}</td>
              <td>${admin || t.assigned_to === user.id ? statusCell : badge}</td>
              <td>${formatDate(t.due_date)}</td>
              <td>${admin ? actions : ""}</td>
            </tr>
          `;
        }).join("");
      } catch (err) {
        showAlert("alertBox", err.message);
        tbody.innerHTML = "";
      }
    }

    window.updateStatus = async function (taskId, status) {
      try {
        await apiRequest(`/tasks/${taskId}`, {
          method: "PUT",
          body: JSON.stringify({ status }),
        });
        loadTasks();
      } catch (err) {
        showAlert("alertBox", err.message);
      }
    };

    window.deleteTask = async function (taskId) {
      if (!confirm("Delete this task?")) return;
      try {
        await apiRequest(`/tasks/${taskId}`, { method: "DELETE" });
        loadTasks();
        showAlert("alertBox", "Task deleted.", "success");
      } catch (err) {
        showAlert("alertBox", err.message);
      }
    };

    const taskForm = document.getElementById("taskForm");
    if (taskForm) {
      taskForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const assignee = document.getElementById("taskAssignee").value;
        try {
          await apiRequest("/tasks", {
            method: "POST",
            body: JSON.stringify({
              title: document.getElementById("taskTitle").value,
              description: document.getElementById("taskDescription").value || null,
              project_id: parseInt(document.getElementById("taskProject").value),
              assigned_to: assignee ? parseInt(assignee) : null,
              due_date: document.getElementById("taskDueDate").value || null,
              status: "Pending",
            }),
          });
          taskForm.reset();
          loadTasks();
          showAlert("alertBox", "Task created!", "success");
        } catch (err) {
          showAlert("alertBox", err.message);
        }
      });
    }

    loadSelectOptions();
    loadTasks();
  </script>
</body>
</html>
