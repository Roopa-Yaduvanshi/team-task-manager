<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Team Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Team Task Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="tasks.html">Tasks</a></li>
        </ul>
        <span class="navbar-text text-white me-2">
          <span id="navUserName"></span>
          <span id="navUserRole" class="badge ms-1"></span>
        </span>
        <a href="#" id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="page-header">
      <h1>Dashboard</h1>
      <p class="text-muted">Overview of your tasks</p>
    </div>

    <div id="alertBox"></div>

    <div class="row g-4">
      <div class="col-md-6 col-lg-3">
        <div class="card stat-card p-4 text-center">
          <p class="text-muted mb-1">Total Tasks</p>
          <p class="display-6 mb-0" id="totalTasks">0</p>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="card stat-card p-4 text-center">
          <p class="text-muted mb-1">Completed</p>
          <p class="display-6 mb-0 text-success" id="completedTasks">0</p>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="card stat-card p-4 text-center">
          <p class="text-muted mb-1">Pending</p>
          <p class="display-6 mb-0 text-warning" id="pendingTasks">0</p>
        </div>
      </div>
      <div class="col-md-6 col-lg-3">
        <div class="card stat-card p-4 text-center">
          <p class="text-muted mb-1">Overdue</p>
          <p class="display-6 mb-0 text-danger" id="overdueTasks">0</p>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <a href="tasks.html" class="btn btn-primary">View Tasks</a>
      <a href="projects.html" class="btn btn-outline-primary admin-only">Manage Projects</a>
    </div>
  </main>

  <footer>Team Task Manager</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script>
    if (!requireAuth()) throw new Error("auth");
    setupNavbar();

    async function loadDashboard() {
      try {
        const stats = await apiRequest("/dashboard");
        document.getElementById("totalTasks").textContent = stats.total_tasks;
        document.getElementById("completedTasks").textContent = stats.completed_tasks;
        document.getElementById("pendingTasks").textContent = stats.pending_tasks;
        document.getElementById("overdueTasks").textContent = stats.overdue_tasks;
      } catch (err) {
        showAlert("alertBox", err.message);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
