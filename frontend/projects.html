<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Team Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">Team Task Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="tasks.html">Tasks</a></li>
        </ul>
        <span class="navbar-text text-white me-2">
          <span id="navUserName"></span>
          <span id="navUserRole" class="badge ms-1"></span>
        </span>
        <a href="#" id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="page-header d-flex justify-content-between align-items-center">
      <div>
        <h1>Projects</h1>
        <p class="text-muted mb-0">All team projects</p>
      </div>
    </div>

    <div id="alertBox"></div>

    <!-- Admin: create project form -->
    <div class="card table-card p-4 mb-4 admin-only" id="createProjectCard">
      <h5 class="mb-3">Create Project</h5>
      <form id="projectForm" class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Title</label>
          <input type="text" class="form-control" id="projectTitle" required />
        </div>
        <div class="col-md-6">
          <label class="form-label">Description</label>
          <input type="text" class="form-control" id="projectDescription" />
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button type="submit" class="btn btn-primary w-100">Add</button>
        </div>
      </form>
    </div>

    <div class="card table-card p-4">
      <h5 class="mb-3">All Projects</h5>
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Description</th>
              <th>Created By</th>
            </tr>
          </thead>
          <tbody id="projectsTable">
            <tr><td colspan="4" class="text-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer>Team Task Manager</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script>
    if (!requireAuth()) throw new Error("auth");
    setupNavbar();

    async function loadProjects() {
      const tbody = document.getElementById("projectsTable");
      try {
        const projects = await apiRequest("/projects");
        if (!projects.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-muted">No projects yet.</td></tr>';
          return;
        }
        tbody.innerHTML = projects.map((p) => `
          <tr>
            <td>${p.id}</td>
            <td>${p.title}</td>
            <td>${p.description || "—"}</td>
            <td>${p.creator_name || "—"}</td>
          </tr>
        `).join("");
      } catch (err) {
        showAlert("alertBox", err.message);
        tbody.innerHTML = "";
      }
    }

    const projectForm = document.getElementById("projectForm");
    if (projectForm) {
      projectForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
          await apiRequest("/projects", {
            method: "POST",
            body: JSON.stringify({
              title: document.getElementById("projectTitle").value,
              description: document.getElementById("projectDescription").value || null,
            }),
          });
          projectForm.reset();
          loadProjects();
          showAlert("alertBox", "Project created!", "success");
        } catch (err) {
          showAlert("alertBox", err.message);
        }
      });
    }

    loadProjects();
  </script>
</body>
</html>
